<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Market Index — QuantitativeGenius</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d12;
      --surface: #141419;
      --surface-2: #1a1a22;
      --surface-3: #22222e;
      --border: #2a2a38;
      --text: #e8e6e1;
      --text-muted: #8a8894;
      --text-faint: #5a586a;
      --gold: #f0a030;
      --gold-dim: #c07e1e;
      --gold-glow: rgba(240, 160, 48, 0.12);
      --green: #00d4aa;
      --green-dim: rgba(0, 212, 170, 0.12);
      --red: #ff4444;
      --red-dim: rgba(255, 68, 68, 0.12);
      --yellow: #f5c542;
      --orange: #f58a42;
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'DM Mono', 'SF Mono', monospace;
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 200ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      font-size: 15px;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Header ── */
    .header {
      padding: 28px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .brand-text h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.2;
    }

    .brand-text .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    .header-index {
      text-align: right;
    }

    .index-value {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--gold);
      line-height: 1;
      font-family: var(--font-mono);
      text-shadow: 0 0 40px var(--gold-glow);
    }

    .index-change {
      font-size: 14px;
      font-weight: 500;
      margin-top: 4px;
    }

    .index-change.positive { color: var(--green); }
    .index-change.negative { color: var(--red); }

    .last-updated {
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 2px;
    }

    /* ── Cards Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 700px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
    }

    .card.wti::before { background: linear-gradient(90deg, var(--gold), transparent); }
    .card.brent::before { background: linear-gradient(90deg, #6eb5ff, transparent); }
    .card.threat::before { background: linear-gradient(90deg, var(--green), transparent); }
    .card.threat.elevated::before { background: linear-gradient(90deg, var(--yellow), transparent); }
    .card.threat.high::before { background: linear-gradient(90deg, var(--orange), transparent); }
    .card.threat.critical::before { background: linear-gradient(90deg, var(--red), transparent); }

    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 28px;
      font-weight: 700;
      font-family: var(--font-mono);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .card.wti .card-value { color: var(--gold); }
    .card.brent .card-value { color: #6eb5ff; }

    .card-change {
      font-size: 13px;
      font-weight: 500;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-change.positive { color: var(--green); }
    .card-change.negative { color: var(--red); }

    .arrow-up::before { content: '▲'; font-size: 9px; }
    .arrow-down::before { content: '▼'; font-size: 9px; }

    /* ── Threat Card ── */
    .threat-gauge {
      margin-top: 12px;
      height: 6px;
      background: var(--surface-3);
      border-radius: 3px;
      overflow: hidden;
    }

    .threat-gauge-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease, background 0.4s ease;
    }

    .threat-label {
      font-size: 20px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .threat-label.stable { color: var(--green); }
    .threat-label.elevated { color: var(--yellow); }
    .threat-label.high { color: var(--orange); }
    .threat-label.critical { color: var(--red); }

    .threat-detail {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Chart Section ── */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .chart-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .range-toggles {
      display: flex;
      gap: 4px;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      padding: 3px;
    }

    .range-btn {
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      border: none;
      background: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font-body);
    }

    .range-btn:hover {
      color: var(--text);
      background: var(--surface-3);
    }

    .range-btn.active {
      color: var(--gold);
      background: var(--surface-3);
    }

    .chart-container {
      position: relative;
      height: 380px;
    }

    @media (max-width: 700px) {
      .chart-container { height: 260px; }
    }

    .chart-legend {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 24px 0 32px;
      border-top: 1px solid var(--border);
    }

    .footer a {
      color: #ffffff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      opacity: 0.7;
      transition: opacity var(--transition);
    }

    .footer a:hover {
      opacity: 1;
    }

    /* ── Loading ── */
    .loading-skeleton {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-value {
      width: 120px;
      height: 28px;
    }

    .skeleton-index {
      width: 200px;
      height: 48px;
    }

    /* ── Pulse dot for live ── */
    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--green);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="brand">
          <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Oil Market Index logo">
            <rect width="36" height="36" rx="8" fill="#1a1a22"/>
            <path d="M18 6 C18 6, 10 16, 10 22 C10 26.4183 13.5817 30 18 30 C22.4183 30 26 26.4183 26 22 C26 16 18 6 18 6Z" fill="none" stroke="#f0a030" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M15 23 C15 23 16 21 18 21 C20 21 21 23 21 23" stroke="#f0a030" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="18" cy="18" r="2" fill="#f0a030" opacity="0.4"/>
          </svg>
          <div class="brand-text">
            <h1>Oil Market Index</h1>
            <span class="subtitle">WTI & Brent Composite</span>
          </div>
        </div>
        <div class="header-index">
          <div id="indexValue" class="index-value">
            <div class="loading-skeleton skeleton-index"></div>
          </div>
          <div id="indexChange" class="index-change"></div>
          <div class="last-updated">
            <span class="live-badge"><span class="live-dot"></span>LIVE</span>
            <span id="lastUpdated"></span>
          </div>
        </div>
      </div>
    </header>

    <!-- Price Cards -->
    <div class="cards-grid">
      <div class="card wti">
        <div class="card-label">WTI Crude (CL=F)</div>
        <div id="wtiPrice" class="card-value"><div class="loading-skeleton skeleton-value"></div></div>
        <div id="wtiChange" class="card-change"></div>
      </div>
      <div class="card brent">
        <div class="card-label">Brent Crude (BZ=F)</div>
        <div id="brentPrice" class="card-value"><div class="loading-skeleton skeleton-value"></div></div>
        <div id="brentChange" class="card-change"></div>
      </div>
      <div id="threatCard" class="card threat">
        <div class="card-label">Price Drop Threat Level</div>
        <div id="threatLabel" class="threat-label stable">—</div>
        <div id="threatDetail" class="threat-detail"></div>
        <div class="threat-gauge">
          <div id="threatGaugeFill" class="threat-gauge-fill"></div>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-section">
      <div class="chart-header">
        <div class="chart-title">Price History</div>
        <div class="range-toggles">
          <button class="range-btn" data-range="1D">1D</button>
          <button class="range-btn" data-range="1W">1W</button>
          <button class="range-btn active" data-range="1Y">1Y</button>
          <button class="range-btn" data-range="MAX">MAX</button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>
      <div class="chart-legend">
        <div class="legend-item">
          <span class="legend-dot" style="background: #f0a030;"></span>
          Composite Index
        </div>
        <div class="legend-item">
          <span class="legend-dot" style="background: rgba(240,160,48,0.4);"></span>
          WTI Crude
        </div>
        <div class="legend-item">
          <span class="legend-dot" style="background: #6eb5ff;"></span>
          Brent Crude
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <a href="https://QuantitativeGenius.com" target="_blank" rel="noopener">Sponsored by QuantitativeGenius.com</a>
    </footer>
  </div>

  <script>
    // ── State ──
    let chart = null;
    let currentRange = '1Y';
    let refreshTimer = null;

    // ── Format helpers ──
    function formatNumber(n, decimals = 2) {
      if (n == null) return '—';
      return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }

    function formatIndex(n) {
      if (n == null) return '—';
      return Math.round(n).toLocaleString('en-US');
    }

    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    // ── Fetch current data ──
    async function fetchCurrent() {
      try {
        const res = await fetch('/api/current');
        const data = await res.json();
        if (data.error) return;

        // Index value
        document.getElementById('indexValue').textContent = formatIndex(data.index_value);

        // Change
        const changeEl = document.getElementById('indexChange');
        const sign = data.change >= 0 ? '+' : '';
        changeEl.textContent = `${sign}${formatNumber(data.change, 0)} (${sign}${formatNumber(data.change_percent)}%)`;
        changeEl.className = `index-change ${data.change >= 0 ? 'positive' : 'negative'}`;

        // Timestamp
        document.getElementById('lastUpdated').textContent = formatTime(data.timestamp);

        // WTI
        document.getElementById('wtiPrice').textContent = `$${formatNumber(data.wti_price)}`;

        // Brent
        document.getElementById('brentPrice').textContent = `$${formatNumber(data.brent_price)}`;

        // WTI/Brent change (calculated from history)
        updatePriceChanges();

        // Threat level
        updateThreat(data.threat_level, data.threat_percent);
      } catch (err) {
        console.error('Fetch current error:', err);
      }
    }

    async function updatePriceChanges() {
      try {
        const res = await fetch('/api/history?range=1W');
        const data = await res.json();
        if (!data.readings || data.readings.length < 2) return;

        const latest = data.readings[data.readings.length - 1];
        // Find ~1 day ago
        const oneDayMs = 24 * 60 * 60 * 1000;
        const latestTime = new Date(latest.timestamp).getTime();
        let prev = data.readings[0];
        for (const r of data.readings) {
          if (new Date(r.timestamp).getTime() <= latestTime - oneDayMs) {
            prev = r;
          }
        }

        if (prev.wti_price && latest.wti_price) {
          const wtiChg = ((latest.wti_price - prev.wti_price) / prev.wti_price) * 100;
          const wtiEl = document.getElementById('wtiChange');
          const wtiSign = wtiChg >= 0 ? '+' : '';
          wtiEl.innerHTML = `<span class="${wtiChg >= 0 ? 'arrow-up' : 'arrow-down'}"></span> ${wtiSign}${formatNumber(wtiChg)}%`;
          wtiEl.className = `card-change ${wtiChg >= 0 ? 'positive' : 'negative'}`;
        }

        if (prev.brent_price && latest.brent_price) {
          const brentChg = ((latest.brent_price - prev.brent_price) / prev.brent_price) * 100;
          const brentEl = document.getElementById('brentChange');
          const brentSign = brentChg >= 0 ? '+' : '';
          brentEl.innerHTML = `<span class="${brentChg >= 0 ? 'arrow-up' : 'arrow-down'}"></span> ${brentSign}${formatNumber(brentChg)}%`;
          brentEl.className = `card-change ${brentChg >= 0 ? 'positive' : 'negative'}`;
        }
      } catch (err) {
        console.error('Price change error:', err);
      }
    }

    function updateThreat(level, percent) {
      const card = document.getElementById('threatCard');
      const label = document.getElementById('threatLabel');
      const detail = document.getElementById('threatDetail');
      const fill = document.getElementById('threatGaugeFill');

      card.className = `card threat ${level}`;

      const labels = {
        stable: 'STABLE',
        elevated: 'ELEVATED',
        high: 'HIGH',
        critical: 'CRITICAL'
      };

      const colors = {
        stable: 'var(--green)',
        elevated: 'var(--yellow)',
        high: 'var(--orange)',
        critical: 'var(--red)'
      };

      label.textContent = labels[level] || 'STABLE';
      label.className = `threat-label ${level}`;
      detail.textContent = `24h change: ${percent >= 0 ? '+' : ''}${formatNumber(percent)}%`;

      // Gauge: map percent to 0-100 width
      // 0% drop = 0% fill, -10% or worse = 100% fill
      const absDrop = Math.max(0, -percent);
      const gaugeWidth = Math.min(100, (absDrop / 10) * 100);
      fill.style.width = `${gaugeWidth}%`;
      fill.style.background = colors[level] || colors.stable;
    }

    // ── Chart ──
    async function fetchHistory(range) {
      try {
        const res = await fetch(`/api/history?range=${range}`);
        const data = await res.json();
        return data.readings || [];
      } catch (err) {
        console.error('Fetch history error:', err);
        return [];
      }
    }

    function buildChart(readings) {
      const ctx = document.getElementById('priceChart').getContext('2d');

      const labels = readings.map(r => new Date(r.timestamp));
      const indexData = readings.map(r => r.value);
      const wtiData = readings.map(r => r.wti_price);
      const brentData = readings.map(r => r.brent_price);

      // Scale WTI/Brent to index scale for overlay
      const wtiScaled = wtiData.map(v => v != null ? (v / 147) * 50000 : null);
      const brentScaled = brentData.map(v => v != null ? (v / 147) * 50000 : null);

      if (chart) chart.destroy();

      const timeUnit = currentRange === '1D' || currentRange === '1H' ? 'hour' :
                       currentRange === '1W' ? 'day' :
                       currentRange === '1Y' ? 'month' : 'year';

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Composite Index',
              data: indexData,
              borderColor: '#f0a030',
              backgroundColor: 'rgba(240, 160, 48, 0.05)',
              borderWidth: 2,
              pointRadius: 0,
              pointHoverRadius: 4,
              tension: 0.1,
              fill: true,
              order: 1
            },
            {
              label: 'WTI (scaled)',
              data: wtiScaled,
              borderColor: 'rgba(240, 160, 48, 0.35)',
              borderWidth: 1.2,
              pointRadius: 0,
              pointHoverRadius: 3,
              tension: 0.1,
              borderDash: [4, 3],
              order: 2
            },
            {
              label: 'Brent (scaled)',
              data: brentScaled,
              borderColor: 'rgba(110, 181, 255, 0.5)',
              borderWidth: 1.2,
              pointRadius: 0,
              pointHoverRadius: 3,
              tension: 0.1,
              borderDash: [4, 3],
              order: 3
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1a22',
              titleColor: '#e8e6e1',
              bodyColor: '#8a8894',
              borderColor: '#2a2a38',
              borderWidth: 1,
              padding: 12,
              cornerRadius: 8,
              titleFont: { family: "'DM Sans'", size: 12, weight: '600' },
              bodyFont: { family: "'DM Mono'", size: 12 },
              callbacks: {
                title: function(items) {
                  const d = new Date(items[0].parsed.x);
                  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                },
                label: function(ctx) {
                  const idx = ctx.dataIndex;
                  const reading = readings[idx];
                  if (ctx.datasetIndex === 0) {
                    return `Index: ${formatIndex(ctx.parsed.y)}`;
                  } else if (ctx.datasetIndex === 1 && reading) {
                    return `WTI: $${formatNumber(reading.wti_price)}`;
                  } else if (ctx.datasetIndex === 2 && reading) {
                    return `Brent: $${formatNumber(reading.brent_price)}`;
                  }
                  return '';
                }
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: { unit: timeUnit },
              grid: {
                color: 'rgba(42, 42, 56, 0.5)',
                drawBorder: false
              },
              ticks: {
                color: '#5a586a',
                font: { family: "'DM Sans'", size: 11 },
                maxTicksLimit: 8
              }
            },
            y: {
              grid: {
                color: 'rgba(42, 42, 56, 0.5)',
                drawBorder: false
              },
              ticks: {
                color: '#5a586a',
                font: { family: "'DM Mono'", size: 11 },
                callback: v => v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v
              },
              beginAtZero: false
            }
          }
        }
      });
    }

    async function updateChart(range) {
      currentRange = range;
      const readings = await fetchHistory(range);
      buildChart(readings);
    }

    // ── Range toggle buttons ──
    document.querySelectorAll('.range-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateChart(btn.dataset.range);
      });
    });

    // ── Auto refresh ──
    function startAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => {
        fetchCurrent();
        if (currentRange === '1H' || currentRange === '1D') {
          updateChart(currentRange);
        }
      }, 60000);
    }

    // ── Init ──
    async function init() {
      await fetchCurrent();
      await updateChart('1Y');
      startAutoRefresh();
    }

    init();
  </script>
